services:
  neo4j:
    image: neo4j:5.26
    container_name: outageroot-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/outageroot
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
